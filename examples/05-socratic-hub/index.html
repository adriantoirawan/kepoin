<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kepoin Socratic Hub Sandbox</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { color: #38bdf8; }
    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 600px;
    }
    button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 15px 30px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    .btn-blue { background: #3b82f6; }
    .btn-purple { background: #8b5cf6; }
    .instruction { margin-top: 20px; font-size: 14px; color: #94a3b8; }
  </style>
</head>
<body>

  <div class="container" id="visual-target">
    <h1>The Socratic Hub Sandbox</h1>
    <p>Open a separate terminal and run: <code>npx kepoin listen</code></p>
    
    <button onclick="triggerTypeError()">Throw TypeError</button>
    <button class="btn-blue" onclick="triggerPromiseReject()">Reject Promise</button>
    <button class="btn-purple" onclick="alert('Hover your mouse over this box and press Option+Shift+R (Mac) or Alt+Shift+R (Windows) to trigger a Phantom Snapshot!')">Trigger Phantom Snapshot</button>
    
    <p class="instruction">
      Watch your terminal! All exceptions and visual Phantom Snapshots are instantly piped via WebSocket to the kepoin hub.
    </p>
  </div>

  <script type="module">
    // In a real project, this would be: import { initKepoinBrowser } from 'kepoin/browser';
    import { initKepoinBrowser } from '../../src/clients/browser.js';
    import { initPhantom } from '../../src/clients/phantom.js';

    // 1. Initialize the Universal Bridge (Connects to ws://localhost:54321)
    initKepoinBrowser();
    
    // 2. Initialize the Phantom Snapshot Engine (Listens for Option+Shift+R)
    initPhantom();

    // Global Functions for the buttons
    window.triggerTypeError = () => {
      // Intentionally throwing an error to demonstrate window.onerror interception
      document.querySelector('.non_existent_element').innerHTML = 'Crash!';
    };

    window.triggerPromiseReject = () => {
      // Intentionally rejecting a promise to demonstrate unhandledrejection interception
      Promise.reject(new Error("Async API Call Failed: Network Timeout"));
    };
  </script>

</body>
</html>
